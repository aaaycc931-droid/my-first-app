<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#312e81" />
    <title>暂时无法连接｜视唱练耳</title>
    <style>
      :root { color-scheme: light; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f8fafc; color: #0f172a; }
      main { width: min(32rem, calc(100% - 2rem)); border: 1px solid #c7d2fe; border-radius: 1.5rem; background: white; padding: 1.5rem; box-shadow: 0 1rem 3rem rgb(49 46 129 / 10%); }
      p { line-height: 1.75; color: #475569; }
      button { border: 0; border-radius: 999px; background: #4338ca; color: white; padding: .75rem 1.1rem; font: inherit; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <p>视唱练耳</p>
      <h1>暂时无法连接</h1>
      <p>请检查网络后重试。为保护你的账户和学习记录，离线状态不会显示旧的私人数据，也不会把未保存的练习误认为已经同步。</p>
      <button type="button" onclick="location.reload()">重新连接</button>
    </main>
  </body>
</html>
