name: Deploy Supabase Practice Migrations
# Production deployment is intentionally triggered only by an explicit commit marker.

on:
  push:
    branches:
      - agent/p84-practice-upgrade
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[deploy-supabase]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PGHOST: aws-0-ap-southeast-1.pooler.supabase.com
      PGPORT: "5432"
      PGDATABASE: postgres
      PGUSER: postgres.dpluqcflynztlpophvzq
      PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PGSSLMODE: require

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require database deployment secret
        shell: bash
        run: |
          if [ -z "$PGPASSWORD" ]; then
            echo "::error::SUPABASE_DB_PASSWORD is not configured."
            exit 1
          fi

      - name: Apply interval and rhythm practice migrations
        shell: bash
        run: |
          psql --set ON_ERROR_STOP=on \
            --file supabase/migrations/0006_course_interval_practice.sql \
            --file supabase/migrations/0007_course_rhythm_practice.sql

      - name: Verify exercises, RPC security and role grants
        shell: bash
        run: |
          psql --set ON_ERROR_STOP=on <<'SQL'
          do $$
          begin
            if not exists (
              select 1
              from public.exercises
              where id = '00000000-0000-4000-8000-000000000202'
                and kind = 'interval'
                and is_published = true
            ) then
              raise exception 'interval exercise verification failed';
            end if;

            if not exists (
              select 1
              from public.exercises
              where id = '00000000-0000-4000-8000-000000000203'
                and kind = 'rhythm'
                and is_published = true
            ) then
              raise exception 'rhythm exercise verification failed';
            end if;

            if not exists (
              select 1
              from pg_proc
              where oid = to_regprocedure(
                'public.record_interval_attempt(uuid,integer,text,text,integer,text,text,boolean)'
              )
                and prosecdef = true
            ) then
              raise exception 'interval RPC security verification failed';
            end if;

            if not exists (
              select 1
              from pg_proc
              where oid = to_regprocedure(
                'public.record_rhythm_attempt(uuid,integer,text,integer,text,text,boolean)'
              )
                and prosecdef = true
            ) then
              raise exception 'rhythm RPC security verification failed';
            end if;

            if has_function_privilege(
              'anon',
              'public.record_interval_attempt(uuid,integer,text,text,integer,text,text,boolean)',
              'EXECUTE'
            ) or has_function_privilege(
              'anon',
              'public.record_rhythm_attempt(uuid,integer,text,integer,text,text,boolean)',
              'EXECUTE'
            ) then
              raise exception 'anonymous RPC execution must remain revoked';
            end if;

            if not has_function_privilege(
              'authenticated',
              'public.record_interval_attempt(uuid,integer,text,text,integer,text,text,boolean)',
              'EXECUTE'
            ) or not has_function_privilege(
              'authenticated',
              'public.record_rhythm_attempt(uuid,integer,text,integer,text,text,boolean)',
              'EXECUTE'
            ) then
              raise exception 'authenticated RPC execution grant is missing';
            end if;
          end;
          $$;
          SQL

      - name: Smoke test authenticated writes and cross-user RLS
        shell: bash
        run: |
          psql --set ON_ERROR_STOP=on <<'SQL'
          begin;

          select set_config(
            'smoke.user_id',
            coalesce(
              (select id::text from auth.users order by created_at limit 1),
              ''
            ),
            true
          );

          do $$
          begin
            if current_setting('smoke.user_id', true) = '' then
              raise exception 'RLS smoke test requires one existing auth user';
            end if;
          end;
          $$;

          set local role authenticated;
          select set_config(
            'request.jwt.claim.sub',
            current_setting('smoke.user_id'),
            true
          );

          select set_config(
            'smoke.interval_attempt_id',
            public.record_interval_attempt(
              '00000000-0000-4000-8000-000000000202',
              1,
              '基础',
              '上行',
              0,
              'major-third',
              'major-third',
              true
            )::text,
            true
          );

          select set_config(
            'smoke.rhythm_attempt_id',
            public.record_rhythm_attempt(
              '00000000-0000-4000-8000-000000000203',
              1,
              '基础',
              0,
              'even-quarters',
              'even-quarters',
              true
            )::text,
            true
          );

          do $$
          declare
            visible_attempts integer;
          begin
            select count(*)
            into visible_attempts
            from public.practice_attempts
            where id in (
              current_setting('smoke.interval_attempt_id')::uuid,
              current_setting('smoke.rhythm_attempt_id')::uuid
            );

            if visible_attempts <> 2 then
              raise exception 'authenticated owner cannot read both smoke attempts';
            end if;
          end;
          $$;

          select set_config(
            'request.jwt.claim.sub',
            'ffffffff-ffff-4fff-8fff-ffffffffffff',
            true
          );

          do $$
          declare
            leaked_attempts integer;
          begin
            select count(*)
            into leaked_attempts
            from public.practice_attempts
            where id in (
              current_setting('smoke.interval_attempt_id')::uuid,
              current_setting('smoke.rhythm_attempt_id')::uuid
            );

            if leaked_attempts <> 0 then
              raise exception 'cross-user RLS isolation failed';
            end if;
          end;
          $$;

          rollback;
          SQL
