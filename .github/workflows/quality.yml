name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Mobile runtime tests
        run: |
          npm run test:browser-audio-engine
          npm run test:mobile-lifecycle
          npm run test:local-practice-answer-lock
          npm run test:local-question-scheduler
          npm run test:local-ear-training-single-pitch
          npm run test:local-ear-training-intervals
          npm run test:local-ear-training-rhythm
          npm run test:local-ear-training-melody-dictation

      - name: Validate local Android bundle
        run: npm run android:sync && npm run validate:android-local

      - name: Build
        run: npm run build

  android-local:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build local Android debug APK
        run: npm run android:sync && npm run validate:android-local && cd android && ./gradlew testDebugUnitTest assembleDebug

      - name: Verify and package local Android debug APK
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: node scripts/package-android-local-debug-artifact.mjs

      - name: Upload verified local Android debug APK
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: solfeggio-local-debug-apk-${{ github.sha }}
          path: artifacts/android-local/
          if-no-files-found: error
          retention-days: 14
