name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Mobile runtime tests
        run: |
          npm run test:browser-audio-engine
          npm run test:mobile-lifecycle
          npm run test:local-practice-answer-lock
          npm run test:local-practice-review-queue
          npm run test:mobile-practice-review-storage
          npm run test:mobile-practice-review-ui-contract
          npm run test:mobile-practice-review-behavior
          npm run test:mobile-piano-behavior
          npm run test:piano-audio-foundation
          npm run test:piano-interaction
          npm run test:piano-performance
          npm run test:piano-midi
          npm run test:piano-learning-score
          npm run test:android-local-artifact-verifier
          npm run test:android-version
          npm run test:ci-supply-chain-policy
          npm run test:android-p104-evidence
          npm run test:pitch-benchmark-protocol
          npm run test:offline-pitch-analysis
          npm run test:offline-note-alignment
          npm run test:activity-protocol
          npm run test:analysis-evidence-adapter
          npm run test:companion-activity-bridge
          npm run test:local-question-scheduler
          npm run test:local-practice-catalog
          npm run test:expanded-local-practice-catalog
          npm run test:realtime-pitch-frame
          npm run test:realtime-pitch-curve
          npm run test:local-vocal-exercise
          npm run test:mobile-vocal-exercise-behavior
          npm run test:local-vocal-exercise-ui-contract
          npm run test:local-vocal-target-feedback
          npm run test:local-vocal-practice-record
          npm run test:local-vocal-practice-indexeddb
          npm run test:local-vocal-practice-storage-ui-contract
          npm run test:local-vocal-observation
          npm run test:local-vocal-observation-ui-contract
          npm run test:mobile-vocal-observation-behavior
          npm run test:realtime-pitch-monitor-ui-contract
          npm run test:realtime-pitch-monitor-behavior
          npm run test:local-ear-training-single-pitch
          npm run test:local-ear-training-intervals
          npm run test:local-ear-training-rhythm
          npm run test:local-ear-training-melody-dictation
          npm run test:local-piano-keyboard

      - name: Validate local Android bundle
        run: npm run validate:android-version && npm run android:sync && npm run validate:android-local

      - name: Build
        run: npm run build

  android-local:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Setup JDK
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Install Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Validate Android version provenance
        run: npm run validate:android-version

      - name: Build local Android debug APK
        run: npm run android:sync && npm run validate:android-local && cd android && ./gradlew testDebugUnitTest assembleDebug

      - name: Verify and package local Android debug APK
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: node scripts/package-android-local-debug-artifact.mjs

      - name: Independently verify packaged Android debug artifact
        run: npm run verify:android-local-artifact

      - name: Upload verified local Android debug APK
        if: ${{ success() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: solfeggio-local-debug-apk-${{ github.sha }}
          path: artifacts/android-local/
          if-no-files-found: error
          retention-days: 14
